services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      # Default creds:
      # - login: root
      # - password: rootpassword
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-rootpassword}
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data/db

  minio:
    image: quay.io/minio/minio:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"   # API Port (for apps/SDKs)
      - "127.0.0.1:9001:9001"   # Console Port (for Web UI)
    environment:
      MINIO_ROOT_USER:  ${MINIO_ROOT_USER:-root}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-rootpassword}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  mongo_data:
    driver: local
  minio_data:
    driver: local
